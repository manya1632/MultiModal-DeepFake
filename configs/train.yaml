# train_file: ["../../datasets/DGM4/metadata/train.json"]
# val_file: ["../../datasets/DGM4/metadata/val.json"]      

train_file: ['/kaggle/working/datasets/DGM4/metadata/train.json']
val_file: ['/kaggle/working/datasets/DGM4/metadata/val.json']
bert_config: 'configs/config_bert.json'

# Lightweight training: image size reduced to 224 for T4 GPU compatibility
image_res: 224
vision_width: 768
embed_dim: 256
batch_size_train: 32
batch_size_val: 64
temp: 0.07
queue_size: 65536
momentum: 0.995
alpha: 0.4
max_words: 50
label_smoothing: 0.0

loss_MAC_wgt: 0.1
loss_BIC_wgt: 1
loss_bbox_wgt: 0.1
loss_giou_wgt: 0.1
loss_TMG_wgt: 1
loss_MLC_wgt: 1

# Watermark training additions (Requirements 1.2, 1.3, 1.6)
watermark_alpha: 0.03          # perturbation scale, clamped to [0.01, 0.05]
watermark_dim: 128             # watermark vector dimension (128-bit)
loss_watermark_wgt: 1.0        # weight for combined watermark loss

# Lightweight subset: 30K-40K balanced samples (Requirement 1.1)
subset_size: 35000

# FP16 mixed precision training (Requirement 1.3)
use_fp16: true

# Freeze vision and text encoders; train only fusion + head + watermark modules (Req 1.4, 1.5)
freeze_encoders: true

optimizer: {opt: adamW, lr: 2e-5, lr_img: 1e-4, weight_decay: 0.02}
# Epochs reduced to 8 for T4 GPU 6-8 hour budget (Requirement 1.6)
schedular: {sched: cosine, lr: 2e-5, epochs: 8, min_lr: 1e-6, decay_rate: 1, warmup_lr: 1e-6, warmup_epochs: 1, cooldown_epochs: 0}







